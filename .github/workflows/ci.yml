name: CI

on:
  push:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMPERIAL_RAG_WORKSPACE_ROOT: /Users/danil/Public/imperial
  IMPERIAL_RAG_LIVE_API: "0"
  IMPERIAL_RAG_LIVE_CORPUS: "0"
  IMPERIAL_RAG_LIVE_QDRANT: "0"
  IMPERIAL_RAG_LIVE_ELASTICSEARCH: "0"
  PHOENIX_TRACING_ENABLED: "false"
  IMPERIAL_RAG_TRACING_ENABLED: "false"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run checks
        run: ./scripts/check.sh

  deploy:
    name: Deploy production
    needs: quality
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency:
      group: production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      DEPLOY_HOST: 100.105.60.123
      DEPLOY_USER: server1

    steps:
      - name: Connect to the production tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:github-ci
          ping: 100.105.60.123

      - name: Configure restricted SSH identity
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/imperial_deploy
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/imperial_deploy
          install -m 600 /dev/null ~/.ssh/known_hosts
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy the tested main commit
        run: |
          ssh \
            -i ~/.ssh/imperial_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "deploy $GITHUB_SHA"
