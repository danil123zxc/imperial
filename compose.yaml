services:
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix_data:/mnt/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: imperial-qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./.imperial_rag/qdrant_storage:/qdrant/storage

volumes:
  phoenix_data:
    driver: local
